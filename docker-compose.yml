version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yojanasetu-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - pinecone-local
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yojanasetu-redis
    ports:
      - "6379:6379"

  pinecone-local:
    image: ghcr.io/pinecone-io/pinecone-local:latest
    container_name: yojanasetu-pinecone-local
    ports:
      - "5080:5080"
